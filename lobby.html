<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lobby — ChessWithAreed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --white: #F2F2F7;
      --gold: #C9A84C;
      --gold-dim: rgba(201,168,76,0.15);
      --gold-glow: rgba(201,168,76,0.35);
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --glass-strong-bg: rgba(255,255,255,0.07);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Liquid Glass ── */
    .lg {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
    }
    .lg-strong {
      background: var(--glass-strong-bg);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8,8,8,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-logo {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--glass-strong-bg);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      color: var(--white);
    }
    .nav-username {
      font-size: 0.8rem;
      color: rgba(242,242,247,0.6);
    }
    .btn-signout {
      font-size: 0.75rem;
      color: rgba(242,242,247,0.4);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;
    }
    .btn-signout:hover { color: var(--white); }

    /* ── Page ── */
    .page {
      padding: 80px 20px 120px;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Areed Card ── */
    .areed-card {
      padding: 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .areed-card.online {
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 0 40px rgba(201,168,76,0.12), 0 0 80px rgba(201,168,76,0.06);
    }
    .areed-card-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-width: 0;
    }
    .areed-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      position: relative;
    }
    .areed-avatar.online::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      animation: gold-pulse 2.5s ease-in-out infinite;
    }
    @keyframes gold-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 0; transform: scale(1.3); }
    }
    .areed-info { flex: 1; }
    .areed-name {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 2px;
    }
    .areed-status {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .areed-status.online { color: var(--gold); }
    .areed-status.offline { color: rgba(242,242,247,0.35); }
    .areed-stats {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-shrink: 0;
    }
    .areed-stat { text-align: center; }
    .areed-stat-val {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
    }
    .areed-stat-label {
      font-size: 0.65rem;
      color: rgba(242,242,247,0.4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Challenge Button ── */
    .btn-challenge {
      width: 100%;
      padding: 14px;
      margin-bottom: 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #C9A84C, #a8832e);
      color: #080808;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-challenge:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-challenge:active { transform: translateY(0); }
    .btn-challenge:disabled {
      background: rgba(255,255,255,0.06);
      color: rgba(242,242,247,0.3);
      cursor: not-allowed;
    }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: rgba(242,242,247,0.7);
    }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: rgba(242,242,247,0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .live-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3ddc84;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── Leaderboard ── */
    .leaderboard { overflow: hidden; }
    .lb-header {
      display: grid;
      grid-template-columns: 32px 1fr 48px 48px 60px;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--glass-border);
    }
    .lb-header-cell {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(242,242,247,0.3);
      text-align: right;
    }
    .lb-header-cell:nth-child(2) { text-align: left; }

    .lb-row {
      display: grid;
      grid-template-columns: 32px 1fr 48px 48px 60px;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      align-items: center;
      transition: background 0.15s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,0.03); }
    .lb-row.you { background: rgba(201,168,76,0.06); }

    .lb-rank {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(242,242,247,0.25);
      text-align: center;
    }
    .lb-rank.top { color: var(--gold); }

    .lb-player {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }
    .lb-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--glass-strong-bg);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .lb-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-you-tag {
      font-size: 0.6rem;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px;
      padding: 1px 5px;
      flex-shrink: 0;
    }

    .lb-num {
      font-size: 0.82rem;
      font-weight: 500;
      text-align: right;
      color: rgba(242,242,247,0.8);
    }
    .lb-rating {
      font-size: 0.82rem;
      font-weight: 600;
      text-align: right;
      color: var(--white);
    }

    /* ── Empty / Loading states ── */
    .lb-empty {
      padding: 32px 16px;
      text-align: center;
      color: rgba(242,242,247,0.3);
      font-size: 0.85rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pending challenge banner ── */
    .pending-banner {
      padding: 14px 18px;
      margin-bottom: 20px;
      border-color: rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pending-icon { font-size: 1.2rem; animation: spin-slow 3s linear infinite; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .pending-text { flex: 1; }
    .pending-title { font-size: 0.85rem; font-weight: 600; color: var(--gold); }
    .pending-sub { font-size: 0.75rem; color: rgba(242,242,247,0.4); margin-top: 2px; }
    .btn-cancel {
      font-size: 0.75rem;
      color: rgba(242,242,247,0.4);
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .btn-cancel:hover { color: var(--white); border-color: rgba(255,255,255,0.25); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 100px;
      background: rgba(30,30,30,0.95);
      border: 1px solid var(--glass-border);
      font-size: 0.82rem;
      color: var(--white);
      backdrop-filter: blur(20px);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── Auth gate ── */
    #auth-gate {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      z-index: 300;
      text-align: center;
      padding: 24px;
    }
    #auth-gate h2 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--gold);
    }
    #auth-gate p { font-size: 0.85rem; color: rgba(242,242,247,0.5); }
    .btn-google {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--glass-strong-bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-google:hover { background: rgba(255,255,255,0.1); }

    /* ── Bottom nav capsule ── */
    .bottom-nav {
      position: fixed;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      background: rgba(14,14,14,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 100px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      z-index: 99;
      white-space: nowrap;
    }
    .nav-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(242,242,247,0.4);
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--white); }
    .nav-tab.active {
      background: rgba(255,255,255,0.09);
      color: var(--white);
    }
    .nav-tab-icon { font-size: 0.85rem; line-height: 1; }
  </style>
</head>
<body>

<!-- Auth gate -->
<div id="auth-gate" style="display:none">
  <h2>ChessWithAreed</h2>
  <p>Sign in to enter the lobby</p>
  <button class="btn-google" id="btn-google-signin">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"/></svg>
    Continue with Google
  </button>
</div>

<!-- Nav -->
<nav>
  <a href="index.html" class="nav-logo">ChessWithAreed</a>
  <div class="nav-right">
    <div class="nav-avatar" id="nav-avatar">♔</div>
    <span class="nav-username" id="nav-username">—</span>
    <button class="btn-signout" id="btn-signout">Sign out</button>
  </div>
</nav>

<!-- Main -->
<main class="page">

  <!-- Pending challenge banner (hidden by default) -->
  <div class="lg pending-banner" id="pending-banner" style="display:none">
    <span class="pending-icon">⏳</span>
    <div class="pending-text">
      <div class="pending-title">Challenge sent</div>
      <div class="pending-sub">Waiting for Areed to accept…</div>
    </div>
    <button class="btn-cancel" id="btn-cancel-challenge">Cancel</button>
  </div>

  <!-- Areed card -->
  <div class="lg-strong areed-card" id="areed-card">
    <div class="areed-card-inner">
      <div class="areed-avatar" id="areed-avatar">♔</div>
      <div class="areed-info">
        <div class="areed-name">Areed</div>
        <div class="areed-status offline" id="areed-status">Checking…</div>
      </div>
      <div class="areed-stats">
        <div class="areed-stat">
          <div class="areed-stat-val" id="stat-games">—</div>
          <div class="areed-stat-label">Games</div>
        </div>
        <div class="areed-stat">
          <div class="areed-stat-val" id="stat-wins">—</div>
          <div class="areed-stat-label">Players beat</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Challenge button -->
  <button class="btn-challenge" id="btn-challenge" disabled>Challenge Areed</button>

  <!-- Leaderboard -->
  <div class="section-header">
    <span class="section-title">Leaderboard</span>
    <span class="live-dot">Live</span>
  </div>
  <div class="lg leaderboard">
    <div class="lb-header">
      <div class="lb-header-cell">#</div>
      <div class="lb-header-cell" style="text-align:left">Player</div>
      <div class="lb-header-cell">Games</div>
      <div class="lb-header-cell">Wins</div>
      <div class="lb-header-cell">Rating</div>
    </div>
    <div id="lb-body">
      <div class="lb-empty"><div class="spinner"></div>Loading…</div>
    </div>
  </div>

</main>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-tab">Home</a>
  <a href="lobby.html" class="nav-tab active">Lobby</a>
  <a href="game.html" class="nav-tab" id="nav-game" style="display:none">Game</a>
  <a href="dashboard.html" class="nav-tab" id="nav-dashboard" style="display:none">Dashboard</a>
</nav>

<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://uhudixnuzqxpnipwolhi.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVodWRpeG51enF4cG5pcHdvbGhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDkyODMsImV4cCI6MjA5NzMyNTI4M30.deyt_3BIn8u1ktmF66fQ_9voWFzdcidU20YyxhjRjUs';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentUser = null;
  let currentProfile = null;
  let areedProfile = null;
  let myPendingGame = null;

  // ── Toast ──
  function showToast(msg, duration = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  // ── Auth ──
  async function init() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) {
      document.getElementById('auth-gate').style.display = 'flex';
      return;
    }
    currentUser = session.user;
    document.getElementById('auth-gate').style.display = 'none';
    await loadProfile();
    await loadAreedStatus();
    await loadLeaderboard();
    await checkPendingChallenge();
    subscribeRealtime();
  }

  document.getElementById('btn-google-signin').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  });

  document.getElementById('btn-signout').addEventListener('click', async () => {
    await db.auth.signOut();
    window.location.reload();
  });

  // ── Profile ──
  async function loadProfile() {
    const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
    if (!data) {
      // Auto-create profile on first visit
      const username = currentUser.email.split('@')[0].replace(/[^a-z0-9_]/gi, '').slice(0, 20) || 'player';
      await db.from('profiles').insert({ id: currentUser.id, username });
      currentProfile = { id: currentUser.id, username };
    } else {
      currentProfile = data;
    }
    document.getElementById('nav-username').textContent = currentProfile.username;
    document.getElementById('nav-avatar').textContent = '♔';
    if (currentProfile.username.toLowerCase() === 'areed') {
      const dashLink = document.getElementById('nav-dashboard');
      if (dashLink) dashLink.style.display = 'flex';
    }
  }

  // ── Areed status ──
  // We treat Areed as "online" if they have a session active.
  // Since we can't query auth directly, we use a presence approach:
  // Areed's profile row exists → show stats. Online status uses a simple
  // `areed_online` flag we'll track in the profiles table or just check
  // for recent activity. For now we use a presence column approach:
  // profiles has no `online` col yet, so we show "Online" if an in-progress
  // game exists with areed, else "Available" vs a fallback.
  async function loadAreedStatus() {
    const { data: profile } = await db.from('profiles').select('*').ilike('username', 'areed').single();
    areedProfile = profile;

    const card = document.getElementById('areed-card');
    const avatar = document.getElementById('areed-avatar');
    const statusEl = document.getElementById('areed-status');

    if (!areedProfile) {
      statusEl.textContent = 'Offline';
      statusEl.className = 'areed-status offline';
      document.getElementById('btn-challenge').disabled = true;
      return;
    }

    // Check for active game
    const { data: activeGame } = await db.from('games')
      .select('id')
      .eq('status', 'active')
      .or(`challenger_id.eq.${areedProfile.id}`)
      .limit(1);

    const busy = activeGame && activeGame.length > 0;

    // Areed stats
    const { count: totalGames } = await db.from('games')
      .select('id', { count: 'exact', head: true })
      .or(`challenger_id.eq.${areedProfile.id}`);

    const { count: areedWins } = await db.from('games')
      .select('id', { count: 'exact', head: true })
      .eq('winner_id', areedProfile.id);

    document.getElementById('stat-games').textContent = totalGames ?? 0;
    document.getElementById('stat-wins').textContent = areedWins ?? 0;

    // For online status: we check if Areed has logged in (profile exists = online for demo)
    // A real presence system would use Supabase Realtime Presence
    const isOnline = !!areedProfile;

    avatar.className = 'areed-avatar' + (isOnline ? ' online' : '');
    card.className = 'lg-strong areed-card' + (isOnline ? ' online' : '');

    if (busy) {
      statusEl.textContent = 'In a game';
      statusEl.className = 'areed-status offline';
      document.getElementById('btn-challenge').disabled = true;
      document.getElementById('btn-challenge').textContent = 'Areed is busy — Spectate';
    } else if (isOnline) {
      statusEl.textContent = '● Online';
      statusEl.className = 'areed-status online';
      document.getElementById('btn-challenge').disabled = false;
      document.getElementById('btn-challenge').textContent = 'Challenge Areed';
    } else {
      statusEl.textContent = 'Offline';
      statusEl.className = 'areed-status offline';
      document.getElementById('btn-challenge').disabled = true;
    }
  }

  // ── Leaderboard ──
  async function loadLeaderboard() {
    // Get all profiles except areed
    const { data: profiles } = await db.from('profiles').select('id, username').not('username', 'ilike', 'areed');
    if (!profiles || profiles.length === 0) {
      document.getElementById('lb-body').innerHTML = '<div class="lb-empty">No players yet — be the first!</div>';
      return;
    }

    const ids = profiles.map(p => p.id);

    // Games played (as challenger)
    const { data: gameRows } = await db.from('games')
      .select('challenger_id, winner_id, status')
      .in('challenger_id', ids)
      .eq('status', 'finished');

    // Build stats map
    const stats = {};
    profiles.forEach(p => { stats[p.id] = { username: p.username, games: 0, wins: 0 }; });
    (gameRows || []).forEach(g => {
      if (stats[g.challenger_id]) {
        stats[g.challenger_id].games++;
        if (g.winner_id === g.challenger_id) stats[g.challenger_id].wins++;
      }
    });

    // Convert to array, compute naive rating, sort
    const rows = Object.values(stats).map(s => ({
      ...s,
      rating: 800 + (s.wins * 32) - ((s.games - s.wins) * 16)
    })).sort((a, b) => b.rating - a.rating);

    if (rows.length === 0) {
      document.getElementById('lb-body').innerHTML = '<div class="lb-empty">No games played yet</div>';
      return;
    }

    document.getElementById('lb-body').innerHTML = rows.map((r, i) => {
      const isYou = currentProfile && r.username === currentProfile.username;
      const rankClass = i < 3 ? 'lb-rank top' : 'lb-rank';
      const medals = ['🥇', '🥈', '🥉'];
      const rankDisplay = i < 3 ? medals[i] : i + 1;
      return `
        <div class="lb-row${isYou ? ' you' : ''}">
          <div class="${rankClass}">${rankDisplay}</div>
          <div class="lb-player">
            <div class="lb-avatar">♔</div>
            <span class="lb-name">${r.username}</span>
            ${isYou ? '<span class="lb-you-tag">you</span>' : ''}
          </div>
          <div class="lb-num">${r.games}</div>
          <div class="lb-num">${r.wins}</div>
          <div class="lb-rating">${r.rating}</div>
        </div>`;
    }).join('');
  }

  // ── Challenge ──
  document.getElementById('btn-challenge').addEventListener('click', async () => {
    if (!areedProfile) return;
    if (myPendingGame) return;

    const btn = document.getElementById('btn-challenge');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const { data, error } = await db.from('games').insert({
      challenger_id: currentUser.id,
      status: 'pending',
    }).select().single();

    if (error) {
      showToast('Could not send challenge. Try again.');
      btn.disabled = false;
      btn.textContent = 'Challenge Areed';
      return;
    }

    myPendingGame = data;
    document.getElementById('pending-banner').style.display = 'flex';
    btn.style.display = 'none';
    showToast('Challenge sent! ⚔️');
  });

  // ── Cancel challenge ──
  document.getElementById('btn-cancel-challenge').addEventListener('click', async () => {
    if (!myPendingGame) return;
    await db.from('games').delete().eq('id', myPendingGame.id);
    myPendingGame = null;
    document.getElementById('pending-banner').style.display = 'none';
    const btn = document.getElementById('btn-challenge');
    btn.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Challenge Areed';
    showToast('Challenge cancelled');
  });

  // ── Check for existing pending challenge ──
  async function checkPendingChallenge() {
    if (!currentUser) return;
    const { data } = await db.from('games')
      .select('*')
      .eq('challenger_id', currentUser.id)
      .eq('status', 'pending')
      .single();
    if (data) {
      myPendingGame = data;
      document.getElementById('pending-banner').style.display = 'flex';
      document.getElementById('btn-challenge').style.display = 'none';
    }
  }

  // ── Realtime ──
  function subscribeRealtime() {
    db.channel('lobby-games')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'games' }, async (payload) => {
        // If our pending game got accepted → redirect to game
        if (myPendingGame && payload.new && payload.new.id === myPendingGame.id) {
          if (payload.new.status === 'active') {
            showToast('Areed accepted! Starting game…');
            setTimeout(() => { window.location.href = `game.html?id=${myPendingGame.id}`; }, 1200);
            return;
          }
          if (payload.new.status === 'rejected') {
            myPendingGame = null;
            document.getElementById('pending-banner').style.display = 'none';
            const btn = document.getElementById('btn-challenge');
            btn.style.display = '';
            btn.disabled = false;
            btn.textContent = 'Challenge Areed';
            showToast('Areed declined the challenge');
            return;
          }
        }
        // Refresh leaderboard and areed status on any game change
        await loadAreedStatus();
        await loadLeaderboard();
      })
      .subscribe();
  }

  init();
</script>
</body>
</html>
